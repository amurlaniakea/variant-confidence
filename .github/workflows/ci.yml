# GitHub Actions CI — always-on for our repos (github-actions-sonarcloud skill).
# Activates on push to main / feature branches and on PRs to main.

name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      # Pinned to full commit SHAs (supply-chain hygiene; SonarCloud finding)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # SonarCloud needs full history
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: python -m ruff check .
      - name: Run tests with coverage
        run: |
          pytest --cov=variant_confidence --cov-report=xml --cov-report=term -q
      - name: SAST (bandit -> SARIF)
        run: |
          bandit -r variant_confidence -f json -o bandit.json --exit-zero
          python scripts/bandit2sarif.py bandit.json bandit.sarif
      - name: Upload SARIF to GitHub Code Scanning
        if: matrix.python-version == '3.12'
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: bandit.sarif
          category: bandit
      - name: SonarCloud Scan
        if: matrix.python-version == '3.12' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master @ 2026-07
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.xml
